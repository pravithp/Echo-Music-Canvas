name: Validate Pull Request

on:
  push:
    branches: [ main ]
  pull_request_target:
    branches: [ main ]

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code (Push)
        if: github.event_name == 'push'
        uses: actions/checkout@v3

      - name: Checkout Main Branch (PR Base)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Save Trusted Scripts
        if: github.event_name == 'pull_request_target'
        run: |
          mkdir -p /tmp/trusted-scripts
          cp -r scripts/* /tmp/trusted-scripts/
          cp canvas.json /tmp/baseline-canvas.json

      - name: Fetch PR Branch
        if: github.event_name == 'pull_request_target'
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch

      - name: Security Check (PR Files Filter)
        if: github.event_name == 'pull_request_target'
        run: |
          mapfile -d '' CHANGED_FILES < <(git diff -z --name-only main pr-branch)
          git diff --name-only main pr-branch > /tmp/changed-files.txt
          for file in "${CHANGED_FILES[@]}"; do
            if [[ -n "$file" && ! "$file" =~ ^canvas\.json$ && ! "$file" =~ ^Song/ && ! "$file" =~ ^Album/ ]]; then
              echo "Security Error: PR modifies protected system files ($file). Manual review is required."
              exit 1
            fi
          done

      - name: Checkout PR Branch
        if: github.event_name == 'pull_request_target'
        run: |
          git checkout -f pr-branch

      - name: Scan Files for Malware
        if: github.event_name == 'pull_request_target'
        run: |
          sudo apt-get update && sudo apt-get install -y clamav
          sudo systemctl stop clamav-freshclam || true
          sudo pkill -f freshclam || true
          sudo freshclam || echo "Warning: freshclam database update failed, proceeding only if local definitions exist"
          if [ -f /tmp/changed-files.txt ]; then
            # Check for local ClamAV signature database files used by clamscan.
            if [ -d /var/lib/clamav ] && find /var/lib/clamav -maxdepth 1 -type f \( -name "*.cvd" -o -name "*.cld" -o -name "*.cud" \) | grep -q .; then
              echo "ClamAV definitions found; scanning changed files."
              while IFS= read -r file; do
                if [ -f "$file" ]; then
                  echo "Scanning: $file"
                  clamscan "$file"
                fi
              done < /tmp/changed-files.txt
            else
              echo "Warning: no ClamAV definitions found in /var/lib/clamav; malware scan will be skipped."
              while IFS= read -r file; do
                if [ -f "$file" ]; then
                  echo "Skipping malware scan for $file due to missing ClamAV definitions."
                fi
              done < /tmp/changed-files.txt
            fi
          else
            echo "No changed files list found."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Validation Script
        id: run-validation
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            node /tmp/trusted-scripts/validate_canvas.js
          else
            node scripts/validate_canvas.js
          fi
        continue-on-error: true

      - name: Post PR Comment
        if: github.event_name == 'pull_request_target'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: validation_report.md

      - name: Fail if validation failed
        if: steps.run-validation.outcome == 'failure'
        run: exit 1
